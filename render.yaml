# Render Blueprint — API do Vendy (@vendy/api).
# Importar em: Render Dashboard > New > Blueprint (aponta para este repo).
# As variaveis com sync:false sao preenchidas no painel do Render (segredos).
services:
  - type: web
    name: vendy-api
    runtime: node
    plan: free
    region: ohio # us-east, proximo do Supabase us-east-2
    branch: main
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @vendy/shared build && pnpm --filter @vendy/api exec prisma generate && pnpm --filter @vendy/api build
    startCommand: pnpm --filter @vendy/api exec prisma migrate deploy && node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false # https://www.vendybrasil.com,https://vendybrasil.com
      - key: WHATSAPP_PHONE
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false # ex.: propostas@vendybrasil.com (dominio verificado no Resend)
